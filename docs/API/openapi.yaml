openapi: 3.0.3
info:
  title: CloudCMS Backend API
  version: 1.0.0
  description: OpenAPI contract for Foundation, Auth, Users, Tenants, Computers, and Block Rules modules.
servers:
  - url: http://localhost:3000
    description: Local development
tags:
  - name: Health
  - name: Auth
  - name: Users
  - name: Tenants
  - name: Computers
  - name: Block Rules
paths:
  /health:
    get:
      tags: [Health]
      summary: App health check
      operationId: getAppHealth
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/health/runtime:
    get:
      tags: [Health]
      summary: Runtime metadata health check
      operationId: getRuntimeHealth
      responses:
        "200":
          description: Runtime info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeHealthResponse"
  /api/health/db:
    get:
      tags: [Health]
      summary: Database connectivity health check
      operationId: getDatabaseHealth
      responses:
        "200":
          description: Database healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatabaseHealthResponse"
        "500":
          description: Database health failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/register-tenant:
    post:
      tags: [Auth]
      summary: Register tenant (pending verification)
      operationId: registerTenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterTenantRequest"
      responses:
        "200":
          description: Registration request accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterTenantResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "429":
          $ref: "#/components/responses/TooManyRequestsError"
  /api/auth/register-tenant/verify:
    post:
      tags: [Auth]
      summary: Verify tenant registration code
      operationId: verifyTenantRegistration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyTenantRegistrationRequest"
      responses:
        "200":
          description: Verification successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyTenantRegistrationResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "429":
          $ref: "#/components/responses/TooManyRequestsError"
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login with email/password
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "429":
          $ref: "#/components/responses/TooManyRequestsError"
  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access/refresh tokens
      operationId: refresh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Token refresh successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "429":
          $ref: "#/components/responses/TooManyRequestsError"
  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Revoke refresh token
      operationId: logout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
      responses:
        "200":
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequestsError"
  /api/auth/me:
    get:
      tags: [Auth]
      summary: Get current authenticated user
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user and tenant context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCurrentUserResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /api/users:
    post:
      tags: [Users]
      summary: Create staff user
      operationId: createStaffUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStaffUserRequest"
      responses:
        "200":
          description: Staff user created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffUserSingleResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "409":
          $ref: "#/components/responses/ConflictError"
    get:
      tags: [Users]
      summary: List staff users in current tenant
      operationId: listStaffUsers
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - in: query
          name: status
          schema:
            type: string
            enum: [ACTIVE, DISABLED]
        - in: query
          name: q
          schema:
            type: string
            maxLength: 100
      responses:
        "200":
          description: Staff users paginated result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffUsersListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
  /api/users/{id}:
    get:
      tags: [Users]
      summary: Get staff user by id
      operationId: getStaffUserById
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/idPath"
      responses:
        "200":
          description: Staff user detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffUserSingleResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
    patch:
      tags: [Users]
      summary: Update staff user by id
      operationId: updateStaffUserById
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/idPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStaffUserRequest"
      responses:
        "200":
          description: Staff user updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffUserSingleResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /api/tenants/me:
    get:
      tags: [Tenants]
      summary: Get current tenant profile
      operationId: getCurrentTenant
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantEnvelopeResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
    patch:
      tags: [Tenants]
      summary: Update current tenant name
      operationId: updateCurrentTenant
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCurrentTenantRequest"
      responses:
        "200":
          description: Tenant updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantEnvelopeResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
  /api/tenants:
    get:
      tags: [Tenants]
      summary: List tenants (super_admin)
      operationId: listTenants
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - in: query
          name: status
          schema:
            type: string
            enum: [ACTIVE, SUSPENDED]
        - in: query
          name: q
          schema:
            type: string
            maxLength: 100
      responses:
        "200":
          description: Tenants paginated list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantsListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
  /api/tenants/{id}:
    get:
      tags: [Tenants]
      summary: Get tenant by id (super_admin)
      operationId: getTenantById
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/idPath"
      responses:
        "200":
          description: Tenant detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantEnvelopeResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
    patch:
      tags: [Tenants]
      summary: Update tenant by id (super_admin)
      operationId: updateTenantById
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/idPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTenantByIdRequest"
      responses:
        "200":
          description: Tenant updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantEnvelopeResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /api/computers/register:
    post:
      tags: [Computers]
      summary: Register computer and issue one-time device token
      operationId: registerComputer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterComputerRequest"
      responses:
        "200":
          description: Computer registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComputerTokenResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "429":
          $ref: "#/components/responses/TooManyRequestsError"
  /api/computers:
    get:
      tags: [Computers]
      summary: List computers in current tenant
      operationId: listComputers
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - in: query
          name: status
          schema:
            type: string
            enum: [ACTIVE, INACTIVE, BLOCKED]
        - in: query
          name: q
          schema:
            type: string
            maxLength: 100
        - in: query
          name: sort
          schema:
            type: string
            enum: [createdAt:desc, createdAt:asc, name:asc, name:desc]
      responses:
        "200":
          description: Computers paginated list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComputersListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
  /api/computers/{id}:
    get:
      tags: [Computers]
      summary: Get computer detail by id
      operationId: getComputerById
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/idPath"
      responses:
        "200":
          description: Computer detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComputerSingleResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
    patch:
      tags: [Computers]
      summary: Update computer
      operationId: updateComputerById
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/idPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateComputerRequest"
      responses:
        "200":
          description: Computer updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComputerSingleResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/computers/{id}/reissue-token:
    post:
      tags: [Computers]
      summary: Reissue one-time device token
      operationId: reissueDeviceToken
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/idPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReissueDeviceTokenRequest"
      responses:
        "200":
          description: Device token reissued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComputerTokenResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /api/block-rules:
    post:
      tags: [Block Rules]
      summary: Create a tenant-scoped block rule
      operationId: createBlockRule
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBlockRuleRequest"
      responses:
        "201":
          description: Block rule created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockRuleSingleResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "409":
          $ref: "#/components/responses/ConflictError"
    get:
      tags: [Block Rules]
      summary: List tenant-scoped block rules
      operationId: listBlockRules
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - in: query
          name: type
          schema:
            $ref: "#/components/schemas/BlockRuleType"
        - in: query
          name: status
          schema:
            $ref: "#/components/schemas/BlockRuleStatus"
        - in: query
          name: q
          schema:
            type: string
            maxLength: 100
        - in: query
          name: sort
          schema:
            type: string
            enum: [createdAt:desc, createdAt:asc, priority:desc, priority:asc]
      responses:
        "200":
          description: Block rules paginated list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockRulesListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
  /api/block-rules/batch:
    post:
      tags: [Block Rules]
      summary: Create up to 50 tenant-scoped block rules in one request
      operationId: batchCreateBlockRules
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchCreateBlockRulesRequest"
      responses:
        "201":
          description: Block rules created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockRulesListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "429":
          $ref: "#/components/responses/TooManyRequestsError"
  /api/block-rules/active:
    get:
      tags: [Block Rules]
      summary: Fetch active block rules for an authenticated computer client
      operationId: getActiveBlockRulesForClient
      security:
        - deviceTokenAuth: []
      parameters:
        - in: header
          name: x-computer-id
          required: true
          schema:
            type: string
            minLength: 1
          description: Computer id paired with the bearer device token.
      responses:
        "200":
          description: Active block rules for the computer tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveBlockRulesResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "429":
          $ref: "#/components/responses/TooManyRequestsError"
  /api/block-rules/{id}:
    get:
      tags: [Block Rules]
      summary: Get block rule by id
      operationId: getBlockRuleById
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/idPath"
      responses:
        "200":
          description: Block rule detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockRuleSingleResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
    patch:
      tags: [Block Rules]
      summary: Update block rule by id
      operationId: updateBlockRuleById
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/idPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBlockRuleRequest"
      responses:
        "200":
          description: Block rule updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockRuleSingleResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
    delete:
      tags: [Block Rules]
      summary: Delete block rule by id
      operationId: deleteBlockRuleById
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/idPath"
      responses:
        "200":
          description: Block rule deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockRuleSingleResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    deviceTokenAuth:
      type: http
      scheme: bearer
      bearerFormat: device-token

  parameters:
    idPath:
      in: path
      name: id
      required: true
      schema:
        type: string
        minLength: 1
    page:
      in: query
      name: page
      schema:
        type: integer
        minimum: 1
        default: 1
    pageSize:
      in: query
      name: pageSize
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  responses:
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UnauthorizedError:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ForbiddenError:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ConflictError:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    TooManyRequestsError:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ErrorBody:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          nullable: true
    ErrorResponse:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          $ref: "#/components/schemas/ErrorBody"

    HealthData:
      type: object
      additionalProperties: true
    HealthResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: "#/components/schemas/HealthData"
    RuntimeHealthResponse:
      $ref: "#/components/schemas/HealthResponse"
    DatabaseHealthResponse:
      $ref: "#/components/schemas/HealthResponse"

    AuthUser:
      type: object
      required: [id, email, fullName, role, tenantId]
      properties:
        id: { type: string }
        email: { type: string, format: email }
        fullName: { type: string }
        role:
          type: string
          enum: [super_admin, shop_admin, staff]
        tenantId:
          type: string
          nullable: true
    AuthTenant:
      type: object
      required: [id, code, name, status]
      properties:
        id: { type: string }
        code: { type: string }
        name: { type: string }
        status:
          type: string
          enum: [ACTIVE, SUSPENDED]
    AuthTokenPair:
      type: object
      required: [accessToken, refreshToken]
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }

    RegisterTenantRequest:
      type: object
      additionalProperties: false
      required: [tenantName, tenantCode, adminFullName, adminEmail, adminPassword]
      properties:
        tenantName:
          type: string
          minLength: 1
          maxLength: 120
        tenantCode:
          type: string
          minLength: 1
          maxLength: 50
          pattern: "^[A-Z0-9_]+$"
        adminFullName:
          type: string
          minLength: 1
          maxLength: 120
        adminEmail:
          type: string
          format: email
        adminPassword:
          type: string
          minLength: 8
    RegisterTenantData:
      type: object
      required: [registrationId, email, expiresInSeconds, resendAfterSeconds]
      properties:
        registrationId: { type: string }
        email: { type: string, format: email }
        expiresInSeconds: { type: integer }
        resendAfterSeconds: { type: integer }
    RegisterTenantResponse:
      type: object
      required: [success, data]
      properties:
